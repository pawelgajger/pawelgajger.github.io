<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            /* Tło przeglądarki (nieistotne) */
        }

        /* To jest obszar Twojej grafiki */
        .social-card {
            width: 1200px;
            height: 627px;
            /* Standard LinkedIn */
            background-color: #0f172a;
            /* Tło Twojej strony */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* Efekt Aurora (tło) */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
        }

        .glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
        }

        /* Treść */
        .content {
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            line-height: 1.1;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        h2 {
            font-size: 2.2rem;
            margin-top: 20px;
            color: #94a3b8;
            font-weight: 400;
        }

        .tagline {
            margin-top: 40px;
            font-size: 1.5rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 4px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 15px 40px;
            border-radius: 50px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(5px);
        }

        /* Element ozdobny "kod" */
        .code-icon {
            font-size: 8rem;
            position: absolute;
            opacity: 0.03;
            font-family: monospace;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="social-card">
        <div class="glow"></div>
        <div class="glow-2"></div>
        <div class="code-icon">&lt;Vibe Coding /&gt;</div>

        <div class="content">
            <h1>Paweł Gajger</h1>
            <h2>Senior QA Analyst | Future Data Scientist</h2>
            <div class="tagline">Quality Driven, AI Powered</div>
        </div>
    </div>

</body>

</html>
